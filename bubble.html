<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Bubble Shooter</title>
<style>
  :root {
    --bg: #d8e0e8;
    --panel: #2a3a4a;
    --gold: #f0c040;
    --silver: #c8d8e8;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; touch-action:manipulation; }
  html, body {
    width:100%; height:100%; overflow:hidden;
    background: var(--bg);
    font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
    touch-action: none; user-select: none;
  }
  #app {
    width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center;
  }
  #header {
    width:100%; display:flex; align-items:center; justify-content:space-between;
    padding:8px 12px 4px;
    background: var(--panel);
    border-bottom: 1px solid #2a2a4a;
    flex-shrink:0;
  }
  #title {
    font-size: clamp(16px,4vw,22px);
    font-weight:700; color: var(--gold);
    letter-spacing:2px; text-transform:uppercase;
  }
  #score-area { display:flex; gap:clamp(8px,3vw,20px); align-items:center; }
  .stat { display:flex; flex-direction:column; align-items:center; }
  .stat-label { font-size:9px; color:#888; text-transform:uppercase; letter-spacing:1px; }
  .stat-value { font-size:clamp(14px,3.5vw,18px); font-weight:700; color:var(--gold); }
  #btn-row { display:flex; gap:5px; }
  .btn {
    background: rgba(255,255,255,0.1);
    border:1px solid rgba(240,192,64,0.3);
    color:var(--gold);
    font-family: inherit;
    font-size: clamp(10px,2.5vw,12px);
    padding:5px 10px;
    border-radius:4px; cursor:pointer;
    white-space:nowrap;
    transition:background 0.15s;
  }
  .btn:hover { background:rgba(240,192,64,0.2); }
  #game-wrap {
    flex:1; width:100%;
    display:flex; justify-content:center; align-items:stretch;
    overflow:hidden; position:relative;
  }
  #game-canvas {
    display:block;
    cursor:crosshair;
    touch-action:none;
  }
  #win-screen {
    position:fixed; inset:0;
    background: rgba(0,0,0,0.85);
    display:none; flex-direction:column;
    align-items:center; justify-content:center; gap:16px;
    z-index:100;
  }
  #win-screen.show { display:flex; }
  #win-title { font-size:clamp(28px,8vw,48px); font-weight:900; color:var(--gold); letter-spacing:4px; }
  #win-sub { color:var(--silver); font-size:clamp(14px,3.5vw,18px); }
  .confetti-piece {
    position:fixed; top:-12px; width:10px; height:10px;
    border-radius:2px; pointer-events:none; z-index:200;
    animation: confetti-fall linear forwards;
  }
  @keyframes confetti-fall {
    0%   { transform: translateY(0) rotate(0deg); opacity:1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity:0; }
  }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="title">🫧 Bubbles</div>
    <div id="score-area">
      <div class="stat"><span class="stat-value" id="score-display">0</span><span class="stat-label">Score</span></div>
    </div>
    <div id="btn-row">
      <button class="btn" id="sound-btn" onclick="toggleSound()">🔊</button>
      <button class="btn" onclick="newGame()">New Game</button>
    </div>
  </div>
  <div id="game-wrap">
    <canvas id="game-canvas"></canvas>
  </div>
</div>
<div id="win-screen">
  <div id="win-title">Cleared! 🎉</div>
  <div id="win-sub" id="win-score"></div>
  <button class="btn" style="font-size:16px;padding:10px 28px;" onclick="newGame()">Play Again</button>
</div>

let soundOn = true;
function playSound(name) {
  if (!soundOn || !SOUNDS[name]) return;
  try { const a = new Audio(SOUNDS[name]); a.volume=0.5; a.play().catch(()=>{}); } catch(e){}
}
function toggleSound() {
  soundOn = !soundOn;
  document.getElementById('sound-btn').textContent = soundOn ? '🔊' : '🔇';
}

// ── Constants ──
const COLORS = ['#ff0000','#00ffff','#ffff00','#66ff00','#0808ff','#cc00ff'];
const COLOR_NAMES = ['red','orange','teal','purple','sky','lime'];
const ROWS = 12; // rows of bubbles
const COLS_ODD = 8;  // cols in even rows
const COLS_EVEN = 7; // cols in odd rows (offset)
const DANGER_ROW = 11; // if bubbles reach this row, danger
const SNAP_DIST_FACTOR = 0.9;

// ── State ──
let canvas, ctx;
let CW, CH, BR, GAP, GRID_X0, GRID_Y0, ROW_H;
let grid = [];       // grid[r][c] = color string or null
let bubble = null;   // current bubble being shot
let nextColor = null;
let angle = Math.PI/2; // aim angle (radians from bottom)
let score = 0;
let gameOver = false;
let isDragging = false;
let aimX = null, aimY = null; // aim target
let pendingDrop = false; // new row about to drop

// ── Layout ──
let PLAY_W, PLAY_X0; // narrower play area within the canvas

function computeLayout() {
  const wrap = document.getElementById('game-wrap');
  CW = wrap.clientWidth;
  CH = wrap.clientHeight;
  canvas.width = CW; canvas.height = CH;

  // bubble radius
  const maxByHeight = Math.floor((CH * 0.80) / ((ROWS + 3) * 1.8));
  BR = Math.max(12, Math.min(maxByHeight, 22));
  GAP = 1;
  ROW_H = Math.floor(BR * 1.73);

  // play area: wide enough for COLS_ODD bubbles, centred
  PLAY_W = COLS_ODD * 2 * BR + (COLS_ODD - 1) * GAP + BR * 2;
  PLAY_X0 = Math.floor((CW - PLAY_W) / 2);
  GRID_Y0 = BR + 8;
}

// ── Grid helpers ──
function colsInRow(r) { return r % 2 === 0 ? COLS_ODD : COLS_EVEN; }

function bubblePos(r, c) {
  const cols = colsInRow(r);
  const rowWidth = cols * 2 * BR + (cols - 1) * GAP;
  const x0 = PLAY_X0 + Math.floor((PLAY_W - rowWidth) / 2) + BR;
  const x = x0 + c * (2 * BR + GAP);
  const y = GRID_Y0 + r * ROW_H;
  return { x, y };
}

function nearestCell(px, py) {
  let best = null, bestDist = Infinity;
  for (let r = 0; r < ROWS; r++) {
    const cols = colsInRow(r);
    for (let c = 0; c < cols; c++) {
      if (grid[r] && grid[r][c]) continue; // occupied
      const {x,y} = bubblePos(r,c);
      const d = Math.hypot(px-x, py-y);
      if (d < bestDist) { bestDist = d; best = {r,c}; }
    }
  }
  return bestDist < BR * SNAP_DIST_FACTOR * 2 ? best : null;
}

function getNeighbors(r, c) {
  const nbrs = [];
  // same row
  if (c > 0) nbrs.push([r, c-1]);
  if (c < colsInRow(r)-1) nbrs.push([r, c+1]);
  // rows above/below — hex offset logic
  const even = r % 2 === 0;
  const dcs = even ? [0, -1] : [0, 1]; // column offsets for adjacent rows
  if (r > 0) { nbrs.push([r-1, c+dcs[0]]); nbrs.push([r-1, c+dcs[1]]); }
  if (r < ROWS-1) { nbrs.push([r+1, c+dcs[0]]); nbrs.push([r+1, c+dcs[1]]); }
  return nbrs.filter(([nr,nc]) => nr>=0 && nr<ROWS && nc>=0 && nc<colsInRow(nr));
}

function floodMatch(r, c, color, visited) {
  const key = r+','+c;
  if (visited.has(key)) return [];
  if (!grid[r] || !grid[r][c] || grid[r][c] !== color) return [];
  visited.add(key);
  const result = [{r,c}];
  for (const [nr,nc] of getNeighbors(r,c)) {
    result.push(...floodMatch(nr, nc, color, visited));
  }
  return result;
}

function findFloating() {
  // BFS from row 0 — anything not connected is floating
  const connected = new Set();
  const queue = [];
  for (let c = 0; c < colsInRow(0); c++) {
    if (grid[0] && grid[0][c]) {
      connected.add('0,'+c); queue.push([0,c]);
    }
  }
  while (queue.length) {
    const [r,c] = queue.shift();
    for (const [nr,nc] of getNeighbors(r,c)) {
      const key = nr+','+nc;
      if (!connected.has(key) && grid[nr] && grid[nr][nc]) {
        connected.add(key); queue.push([nr,nc]);
      }
    }
  }
  const floating = [];
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < colsInRow(r); c++) {
      if (grid[r] && grid[r][c] && !connected.has(r+','+c)) {
        floating.push({r,c});
      }
    }
  }
  return floating;
}

function isGridEmpty() {
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < colsInRow(r); c++) {
      if (grid[r] && grid[r][c]) return false;
    }
  }
  return true;
}

// ── Init grid ──
function makeGrid() {
  grid = [];
  for (let r = 0; r < ROWS; r++) {
    grid[r] = new Array(colsInRow(r)).fill(null);
  }
  // fill random number of rows (3-7)
  const numRows = 3 + Math.floor(Math.random() * 5);
  const numColors = 3 + Math.floor(Math.random() * 4); // 3-6 colours
  const palette = [...COLORS].sort(()=>Math.random()-0.5).slice(0, numColors);
  for (let r = 0; r < numRows; r++) {
    for (let c = 0; c < colsInRow(r); c++) {
      if (Math.random() < 0.85) {
        grid[r][c] = palette[Math.floor(Math.random() * palette.length)];
      }
    }
  }
}

// ── Draw helpers ──
function drawBubble(ctx, x, y, r, color, alpha=1) {
  ctx.save();
  ctx.globalAlpha = alpha;

  // base gradient — rich colour with darkened bottom edge
  const grad = ctx.createRadialGradient(x - r*0.25, y - r*0.25, r*0.05, x, y, r);
  grad.addColorStop(0,   lighten(color, 0.55));
  grad.addColorStop(0.45, color);
  grad.addColorStop(1,   darken(color, 0.45));
  ctx.beginPath(); ctx.arc(x, y, r - 0.5, 0, Math.PI*2);
  ctx.fillStyle = grad; ctx.fill();

  // large soft highlight (top-left glow)
  const glow = ctx.createRadialGradient(x - r*0.3, y - r*0.35, 0, x - r*0.2, y - r*0.2, r*0.75);
  glow.addColorStop(0,   'rgba(255,255,255,0.55)');
  glow.addColorStop(0.5, 'rgba(255,255,255,0.15)');
  glow.addColorStop(1,   'rgba(255,255,255,0)');
  ctx.beginPath(); ctx.arc(x, y, r - 0.5, 0, Math.PI*2);
  ctx.fillStyle = glow; ctx.fill();

  // small sharp specular spot
  ctx.beginPath(); ctx.arc(x - r*0.32, y - r*0.32, r*0.18, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,255,255,0.9)'; ctx.fill();

  // subtle rim
  ctx.beginPath(); ctx.arc(x, y, r - 0.5, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba(255,255,255,0.2)'; ctx.lineWidth = 1.5; ctx.stroke();

  ctx.restore();
}

function lighten(hex, amt) {
  const r = parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.min(255,r+255*amt)},${Math.min(255,g+255*amt)},${Math.min(255,b+255*amt)})`;
}
function darken(hex, amt) {
  const r = parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  return `rgb(${Math.max(0,r-255*amt)},${Math.max(0,g-255*amt)},${Math.max(0,b-255*amt)})`;
}

// ── Aim line with bounce ──
function drawAimLine(cx, cy, targetX, targetY) {
  if (targetX === null) return;
  const dx = targetX - cx, dy = targetY - cy;
  const len = Math.hypot(dx, dy);
  if (len === 0) return;
  let vx = dx/len, vy = dy/len;
  if (vy > -0.1) return;

  // Use a brightened version of the current bubble colour
  const lineColor = currentColor ? lighten(currentColor, 0.25) : 'rgba(255,255,255,0.8)';

  ctx.save();
  ctx.strokeStyle = lineColor;
  ctx.lineWidth = 4;
  ctx.setLineDash([10, 8]);
  ctx.lineCap = 'round';
  ctx.globalAlpha = 0.85;
  ctx.beginPath();

  let x = cx, y = cy;
  let bounces = 0;
  const totalLen = CH * 4; // long enough to always reach the top
  let travelled = 0;
  const wallL = PLAY_X0 + BR;
  const wallR = PLAY_X0 + PLAY_W - BR;
  ctx.moveTo(x, y);

  while (travelled < totalLen) {
    let tLeft  = vx < 0 ? (wallL - x) / vx : Infinity;
    let tRight = vx > 0 ? (wallR - x) / vx : Infinity;
    let tTop   = vy < 0 ? (GRID_Y0 - y) / vy : Infinity;
    let tDist  = totalLen - travelled;
    const t = Math.min(tLeft, tRight, tTop, tDist);
    x += vx * t; y += vy * t;
    ctx.lineTo(x, y);
    travelled += t;
    if (t === tLeft || t === tRight) {
      vx = -vx; bounces++;
      if (bounces > 5) break;
    } else break; // hit top or exhausted length
  }
  ctx.stroke();
  ctx.restore();
}

// ── Popping animation ──
let popParticles = [];
function addPopParticles(x, y, color) {
  for (let i = 0; i < 8; i++) {
    const angle = (Math.PI*2/8)*i + Math.random()*0.4;
    popParticles.push({ x, y, vx: Math.cos(angle)*3, vy: Math.sin(angle)*3, color, life:1, r: BR*0.4 });
  }
}

// ── Render ──
let lastTime = 0;
function render(ts=0) {
  const dt = Math.min((ts - lastTime)/1000, 0.05);
  lastTime = ts;

  ctx.clearRect(0,0,CW,CH);

  // light grey background
  ctx.fillStyle = '#dde3ea';
  ctx.fillRect(0,0,CW,CH);

  // side areas (outside play zone) — slightly darker
  ctx.fillStyle = '#c8d0d8';
  ctx.fillRect(0, 0, PLAY_X0, CH);
  ctx.fillRect(PLAY_X0 + PLAY_W, 0, CW - PLAY_X0 - PLAY_W, CH);

  // play area background
  ctx.fillStyle = '#eef2f6';
  ctx.fillRect(PLAY_X0, 0, PLAY_W, CH);

  // play area walls
  ctx.strokeStyle = '#aab4be';
  ctx.lineWidth = 2; ctx.setLineDash([]);
  ctx.beginPath();
  ctx.moveTo(PLAY_X0, 0); ctx.lineTo(PLAY_X0, CH);
  ctx.moveTo(PLAY_X0 + PLAY_W, 0); ctx.lineTo(PLAY_X0 + PLAY_W, CH);
  ctx.stroke();

  // grid bubbles
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < colsInRow(r); c++) {
      if (grid[r] && grid[r][c]) {
        const {x,y} = bubblePos(r,c);
        drawBubble(ctx, x, y, BR, grid[r][c]);
      }
    }
  }

  const cx = PLAY_X0 + PLAY_W/2;
  const cy = CH - BR*2;

  // aim line
  if (!bubble && !gameOver) {
    drawAimLine(cx, cy, aimX, aimY);
  }

  // flying bubble
  if (bubble) {
    bubble.x += bubble.vx * dt * 60;
    bubble.y += bubble.vy * dt * 60;
    if (bubble.x - BR < PLAY_X0) { bubble.x = PLAY_X0 + BR; bubble.vx = Math.abs(bubble.vx); playSound('bounce'); }
    if (bubble.x + BR > PLAY_X0 + PLAY_W) { bubble.x = PLAY_X0 + PLAY_W - BR; bubble.vx = -Math.abs(bubble.vx); playSound('bounce'); }
    const hitRow = (bubble.y - GRID_Y0) / ROW_H;
    let snapped = false;
    if (bubble.y - BR <= GRID_Y0 + ROW_H * 1.5 || hitRow < 1) {
      snapBubble(); snapped = true;
    } else {
      for (let r = 0; r < ROWS && !snapped; r++) {
        for (let c = 0; c < colsInRow(r) && !snapped; c++) {
          if (grid[r][c]) {
            const {x,y} = bubblePos(r,c);
            if (Math.hypot(bubble.x-x, bubble.y-y) < BR*2) {
              snapBubble(); snapped = true;
            }
          }
        }
      }
    }
    if (!snapped) drawBubble(ctx, bubble.x, bubble.y, BR, bubble.color);
  }

  // current bubble at cannon position (drawn, no barrel)
  if (!gameOver && !bubble) {
    drawBubble(ctx, cx, cy, BR, currentColor || '#888');
  }

  // NEXT bubble — bottom right corner of play area
  if (!gameOver) {
    const nextX = PLAY_X0 + PLAY_W - BR - 4;
    const nextY = cy;
    ctx.fillStyle = '#556677';
    ctx.font = `bold ${Math.max(9, BR*0.55)}px 'Trebuchet MS', sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText('NEXT', nextX, nextY - BR - 4);
    if (nextColor) drawBubble(ctx, nextX, nextY, BR, nextColor);
    // tap hint
    ctx.fillStyle = '#889aaa';
    ctx.font = `${Math.max(7, BR*0.42)}px 'Trebuchet MS', sans-serif`;
    ctx.fillText('tap to swap', nextX, nextY + BR + 12);
  }

  // pop particles
  popParticles = popParticles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life -= dt*3;
    if (p.life > 0) {
      ctx.save(); ctx.globalAlpha = p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2); ctx.fill();
      ctx.restore(); return true;
    }
    return false;
  });

  requestAnimationFrame(render);
}

let currentColor = null;

function snapBubble() {
  if (!bubble) return;
  const {color, x, y} = bubble;
  bubble = null;

  // Only consider cells that are adjacent to an existing bubble OR in the top row
  function isValidCell(r, c) {
    if (r === 0) return true; // top row always valid
    for (const [nr, nc] of getNeighbors(r, c)) {
      if (grid[nr] && grid[nr][nc]) return true;
    }
    return false;
  }

  // find nearest valid empty cell
  let best = null, bestDist = Infinity;
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < colsInRow(r); c++) {
      if (!grid[r][c] && isValidCell(r, c)) {
        const pos = bubblePos(r, c);
        const d = Math.hypot(x - pos.x, y - pos.y);
        if (d < bestDist) { bestDist = d; best = {r, c}; }
      }
    }
  }
  if (!best) { spawnBubble(); return; }
  const {r, c} = best;
  grid[r][c] = color;

  // check match
  const matched = floodMatch(r, c, color, new Set());
  if (matched.length >= 3) {
    playSound('multipop');
    matched.forEach(({r:mr,c:mc}) => {
      const pos = bubblePos(mr,mc);
      addPopParticles(pos.x, pos.y, grid[mr][mc]);
      grid[mr][mc] = null;
    });
    score += matched.length * 10;
    // remove floating
    const floating = findFloating();
    if (floating.length) {
      playSound('multipop');
      floating.forEach(({r:fr,c:fc}) => {
        const pos = bubblePos(fr,fc);
        addPopParticles(pos.x, pos.y, grid[fr][fc]);
        grid[fr][fc] = null;
        score += 5;
      });
    }
    document.getElementById('score-display').textContent = score;
    if (isGridEmpty()) { setTimeout(winGame, 400); return; }
  } else {
    playSound('pop');
  }
  spawnBubble();
}

function spawnBubble() {
  currentColor = nextColor || randomColor();
  nextColor = randomColor();
}

function randomColor() {
  // only use colors present in grid (so player can always match) + 1 random
  const present = new Set();
  for (let r=0;r<ROWS;r++) for(let c=0;c<colsInRow(r);c++) if(grid[r][c]) present.add(grid[r][c]);
  const pool = present.size > 0 ? [...present] : COLORS;
  // 80% chance to pick from present, 20% random
  if (Math.random() < 0.8 && pool.length > 0) return pool[Math.floor(Math.random()*pool.length)];
  return COLORS[Math.floor(Math.random()*COLORS.length)];
}

function shoot(tx, ty) {
  if (bubble || gameOver) return;
  const cx = PLAY_X0 + PLAY_W/2, cy = CH - BR*2;
  const dx = tx-cx, dy = ty-cy;
  if (dy >= -20) return;
  const len = Math.hypot(dx,dy);
  const speed = BR * 42;
  bubble = { x:cx, y:cy, vx:(dx/len)*speed/60, vy:(dy/len)*speed/60, color:currentColor };
  playSound('shoot');
}

function spawnConfetti() {
  const colors = ['#ff0000','#00ffff','#ffff00','#66ff00','#0808ff','#cc00ff','#ffffff','#ffaacc'];
  for (let i = 0; i < 90; i++) {
    setTimeout(() => {
      const el = document.createElement('div');
      el.className = 'confetti-piece';
      el.style.left = Math.random() * 100 + 'vw';
      el.style.background = colors[Math.floor(Math.random() * colors.length)];
      el.style.animationDuration = (1.4 + Math.random() * 2) + 's';
      el.style.animationDelay = '0s';
      el.style.transform = `rotate(${Math.random() * 360}deg)`;
      el.style.width = (7 + Math.random() * 6) + 'px';
      el.style.height = el.style.width;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 4000);
    }, i * 35);
  }
}

// ── Win ──
function winGame() {
  gameOver = true;
  playSound('win');
  document.getElementById('win-sub').textContent = `Score: ${score}`;
  setTimeout(() => {
    spawnConfetti();
    document.getElementById('win-screen').classList.add('show');
  }, 200);
}

// ── New game ──
function newGame() {
  document.getElementById('win-screen').classList.remove('show');
  gameOver = false; score = 0; bubble = null; popParticles = [];
  document.getElementById('score-display').textContent = '0';
  makeGrid();
  currentColor = randomColor();
  nextColor = randomColor();
}

let justSwapped = false;

function swapBubbles() {
  if (bubble || gameOver) return;
  const tmp = currentColor;
  currentColor = nextColor;
  nextColor = tmp;
  justSwapped = true;
  playSound('pop');
}

function hitNextBubble(x, y) {
  // returns true if (x,y) is within the Next bubble circle
  const cx = PLAY_X0 + PLAY_W/2;
  const cy = CH - BR*2;
  const nextX = PLAY_X0 + PLAY_W - BR - 4;
  const nextY = cy;
  return Math.hypot(x - nextX, y - nextY) <= BR * 1.4; // slightly generous hit area
}

// ── Input ──
function getPos(e) {
  const r = canvas.getBoundingClientRect();
  if (e.touches) {
    return { x: e.touches[0].clientX - r.left, y: e.touches[0].clientY - r.top };
  }
  return { x: e.clientX - r.left, y: e.clientY - r.top };
}

// ── Init ──
canvas = document.getElementById('game-canvas');
ctx = canvas.getContext('2d');
computeLayout();
newGame();

// ── Event listeners (after canvas is assigned) ──
canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  const {x,y} = getPos(e);
  // tap on Next bubble — swap instead of shoot
  if (hitNextBubble(x, y)) { swapBubbles(); return; }
  isDragging = true;
  aimX = x; aimY = y;
}, {passive:false});

canvas.addEventListener('pointermove', e => {
  e.preventDefault();
  if (!isDragging) return;
  const {x,y} = getPos(e);
  aimX = x; aimY = y;
}, {passive:false});

canvas.addEventListener('pointerup', e => {
  e.preventDefault();
  isDragging = false;
  if (justSwapped) { justSwapped = false; return; }
  if (aimX !== null && aimY !== null) shoot(aimX, aimY);
}, {passive:false});

canvas.addEventListener('pointerleave', () => { isDragging = false; });

// ── Prevent iOS zoom ──
document.addEventListener('gesturestart', e=>e.preventDefault());
document.addEventListener('gesturechange', e=>e.preventDefault());
document.addEventListener('touchmove', e=>{ if(e.touches.length>1) e.preventDefault(); },{passive:false});

// ── Resize ──
window.addEventListener('resize', () => { computeLayout(); });

requestAnimationFrame(render);
</script>
</body>
